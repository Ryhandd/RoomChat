<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoomChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOBBY -->
  <div id="lobby" class="overlay">
    <div class="lobby-card">
      <div class="logo">
        <span class="logo-bracket">[</span>
        <span class="logo-text">ROOMCHAT</span>
        <span class="logo-bracket">]</span>
      </div>
      <p class="logo-sub">encrypted · ephemeral · private</p>

      <div class="tab-buttons">
        <button id="tab-create" onclick="showTab('create')" class="active">Create</button>
        <button id="tab-join" onclick="showTab('join')">Join</button>
      </div>

      <div id="create-tab" class="tab-content">
        <div class="input-group">
          <label>NICKNAME</label>
          <input type="text" id="create-username" placeholder="Your name" maxlength="20" autocomplete="off">
        </div>
        <div class="input-group">
          <label>USER LIMIT</label>
          <input type="number" id="limit-input" placeholder="2–20" min="2" max="20" value="2">
        </div>
        <button class="primary-btn" onclick="createRoom()">
          <span>Create Room</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

      <div id="join-tab" class="tab-content" style="display:none;">
        <div class="input-group">
          <label>NICKNAME</label>
          <input type="text" id="join-username" placeholder="Your name" maxlength="20" autocomplete="off">
        </div>
        <div class="input-group">
          <label>ROOM CODE</label>
          <input type="text" id="room-input" placeholder="XXXXXX" maxlength="6" autocomplete="off" class="mono-input">
        </div>
        <button class="primary-btn" onclick="joinRoom()">
          <span>Join Room</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- CHAT APP -->
  <div class="chat-container" style="display:none;" id="chat-app">
    <div class="chat-header">
      <div class="header-left">
        <div class="header-logo">[RC]</div>
        <div class="header-info">
          <span class="room-label">ROOM</span>
          <span id="display-code" class="room-code">—</span>
        </div>
      </div>
      <div class="header-right">
        <div class="user-count-badge">
          <span class="dot"></span>
          <span id="user-count">1</span>/<span id="user-limit">2</span>
        </div>
        <button class="copy-btn" onclick="copyRoomCode()" title="Copy room code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>

    <div id="chat"></div>

    <div id="typing-area">
      <span id="typing-text"></span>
    </div>

    <div class="input-area">
      <input id="message" placeholder="Type a message..." autocomplete="off" />
      <button id="send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="chat.js"></script>
</body>
</html>
