<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Private Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="lobby" class="overlay">
    <div class="lobby-card">
      <h2>RoomChat</h2>
      <div class="tab-buttons">
        <button onclick="showTab('create')">Create</button>
        <button onclick="showTab('join')">Join</button>
      </div>

      <div id="create-tab" class="tab-content">
        <input type="number" id="limit-input" placeholder="User Limit (e.g. 5)" min="2" value="2">
        <button onclick="createRoom()">Create Room</button>
      </div>

      <div id="join-tab" class="tab-content" style="display:none;">
        <input type="text" id="room-input" placeholder="Enter Room Code">
        <button onclick="joinRoom()">Join Room</button>
      </div>
    </div>
  </div>

  <div class="chat-container" style="display:none;" id="chat-app">
    <div class="room-info">Room Code: <span id="display-code">-</span></div>
    <div id="chat"></div>
    <div class="input-area">
      <input id="message" placeholder="Type something..." />
      <button id="send">Send</button>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
